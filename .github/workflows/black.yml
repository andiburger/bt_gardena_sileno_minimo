name: Code Formatting (Black)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install Black
      run: |
        python -m pip install --upgrade pip
        pip install black

    - name: Check code formatting with Black
      # Das --check Flag sorgt dafür, dass Black den Code nicht ändert, sondern nur prüft und meckert, falls er nicht formatiert ist.
      run: black --check .