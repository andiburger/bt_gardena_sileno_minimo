name: Security Scanner (Bandit)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Wieder unser geliebter Play-Button!

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip'

    - name: Install Bandit
      run: |
        python -m pip install --upgrade pip
        pip install bandit

    - name: Run Security Check
      # -r durchsucht alle Ordner
      # -ll und -ii filtern ganz leichte Warnungen heraus, sodass der Build nur bei echten Problemen (Medium/High) abbricht.
      run: bandit -r . -ll -ii