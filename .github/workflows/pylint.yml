name: Pylint

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Ich habe Python 3.11 und 3.12 ergänzt, da dein Dockerfile 3.12 nutzt!
        python-version: ["3.10", "3.11", "3.12"] 
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6 # Update auf v5 (neueste Version)
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip' # Beschleunigt den Workflow erheblich!
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint pytest pytest-asyncio
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Analysing the code with pylint
      run: |
       pylint --errors-only $(git ls-files '*.py')
