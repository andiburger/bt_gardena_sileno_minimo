version: 2
updates:
  # Hält deine Python-Abhängigkeiten (requirements.txt) aktuell
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    
  # Prüft, ob es ein neues python:3.12-slim Image gibt
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
  
  # Hält deine CI-Workflows selbst aktuell (z.B. actions/checkout@v4 zu v5)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"